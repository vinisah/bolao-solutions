name: keepalive

# Mantém o projeto Supabase Free "acordado" (ele pausa após ~7 dias sem queries).
# Roda a cada 3 dias e também pode ser disparado na mão (aba Actions > Run workflow).
on:
  schedule:
    - cron: '0 9 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/jogos?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP $code"
          test "$code" = "200"
